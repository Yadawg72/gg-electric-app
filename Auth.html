<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Authenticating...</title>
</head>
<body style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;background:#f0f0f0;">
<div style="text-align:center;">
  <p>Processing your authentication...</p>
  <p id="status">Please wait...</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = window.supabase.createClient(
  'https://cghhtoshpmfcreawmfvm.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNnaGh0b3NocG1mY3JlYXdtZnZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NjA3OTksImV4cCI6MjA5NDAzNjc5OX0.jREgZEdn8f5pVFJO-50Y1AYQoGtiy618dQw_S7kmsdw'
);

(async () => {
  const status = document.getElementById('status');
  
  try {
    // Wait longer for Supabase to process the URL fragment token
    await new Promise(r => setTimeout(r, 1000));
    
    // Get the session - Supabase should have processed the #access_token from URL
    const { data, error } = await sb.auth.getSession();
    
    console.log('Session data:', data);
    console.log('Session error:', error);
    
    if (error) {
      console.error('Session error:', error);
    }
    
    if (data?.session) {
      const user = data.session.user;
      console.log('User:', user);
      
      // Check if user has a name set (completed signup) or just invited
      if (user.user_metadata?.first_name) {
        // User has completed signup, go to dashboard
        status.textContent = 'Welcome back! Redirecting...';
        setTimeout(() => {
          window.location.href = 'https://gg-florida0.vercel.app/';
        }, 1000);
      } else {
        // New user from invite, go to signup completion page
        status.textContent = 'Setting up your account...';
        setTimeout(() => {
          window.location.href = 'https://gg-florida0.vercel.app/signup.html';
        }, 500);
      }
    } else {
      status.textContent = 'No session found. Redirecting to login...';
      console.log('No session found, redirecting to login');
      setTimeout(() => {
        window.location.href = 'https://gg-florida0.vercel.app/';
      }, 2000);
    }
  } catch (err) {
    status.textContent = 'Error: ' + err.message;
    console.error('Auth error:', err);
  }
})();
</script>
</body>
</html>
