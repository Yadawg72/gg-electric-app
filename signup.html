<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Your Account - G&G Electric</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #4A8B8C 0%, #2C5F60 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 420px;
      padding: 40px;
    }
    .logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo h1 {
      color: #4A8B8C;
      font-size: 24px;
      margin-bottom: 5px;
    }
    .logo p {
      color: #666;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      color: #333;
      font-weight: 500;
      margin-bottom: 8px;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #4A8B8C;
      box-shadow: 0 0 0 3px rgba(74, 139, 140, 0.1);
    }
    input:disabled {
      background: #f5f5f5;
      cursor: not-allowed;
    }
    .button {
      width: 100%;
      padding: 12px;
      background: #4A8B8C;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 10px;
    }
    .button:hover {
      background: #2C5F60;
    }
    .button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .message {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .message.error {
      background: #fee;
      color: #c33;
      border: 1px solid #fcc;
    }
    .message.success {
      background: #efe;
      color: #3c3;
      border: 1px solid #cfc;
    }
    .message.info {
      background: #eef;
      color: #33c;
      border: 1px solid #ccf;
    }
    .loading {
      text-align: center;
      padding: 20px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f0f0f0;
      border-top: 4px solid #4A8B8C;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .password-requirements {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 4px;
    }
    .req-item {
      margin: 4px 0;
    }
    .req-item.met {
      color: #3c3;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>G&G Electric</h1>
      <p>Create Your Account</p>
    </div>

    <div id="content">
      <div id="signup-form">
        <div id="message"></div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="your@email.com" disabled>
          <small style="color: #999; display: block; margin-top: 4px;">From your invite link</small>
        </div>

        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" placeholder="John">
        </div>

        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" placeholder="Doe">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••">
          <div class="password-requirements">
            <div class="req-item" id="req-length">✓ At least 8 characters</div>
            <div class="req-item" id="req-upper">✓ One uppercase letter</div>
            <div class="req-item" id="req-lower">✓ One lowercase letter</div>
            <div class="req-item" id="req-number">✓ One number</div>
          </div>
        </div>

        <button class="button" id="signup-btn" onclick="handleSignup()">Create Account</button>
      </div>

      <div id="loading-state" style="display: none;">
        <div class="loading">
          <div class="spinner"></div>
          <p>Setting up your account...</p>
        </div>
      </div>

      <div id="success-state" style="display: none;">
        <div class="message success">
          <strong>Success!</strong> Your account has been created.
        </div>
        <p style="text-align: center; color: #666; margin-bottom: 20px;">Redirecting to the app...</p>
        <button class="button" onclick="window.location.href='https://gg-florida0.vercel.app/'">Go to Dashboard</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://cghhtoshpmfcreawmfvm.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNnaGh0b3NocG1mY3JlYXdtZnZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NjA3OTksImV4cCI6MjA5NDAzNjc5OX0.jREgZEdn8f5pVFJO-50Y1AYQoGtiy618dQw_S7kmsdw';
    
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let userEmail = '';
    let accessToken = '';

    // Initialize on page load
    (async () => {
      try {
        // Get the session from the URL fragment
        await new Promise(r => setTimeout(r, 100));
        const { data } = await sb.auth.getSession();
        
        if (data?.session) {
          userEmail = data.session.user.email;
          accessToken = data.session.access_token;
          document.getElementById('email').value = userEmail;
        } else {
          showMessage('Invalid or expired invite link. Please request a new invitation.', 'error');
          document.getElementById('signup-form').style.display = 'none';
        }
      } catch (err) {
        showMessage('Error processing your invitation: ' + err.message, 'error');
      }
    })();

    // Password validation
    document.getElementById('password').addEventListener('input', (e) => {
      const pwd = e.target.value;
      updateReq('req-length', pwd.length >= 8);
      updateReq('req-upper', /[A-Z]/.test(pwd));
      updateReq('req-lower', /[a-z]/.test(pwd));
      updateReq('req-number', /[0-9]/.test(pwd));
    });

    function updateReq(id, met) {
      const el = document.getElementById(id);
      el.classList.toggle('met', met);
      el.style.color = met ? '#3c3' : '#999';
    }

    async function handleSignup() {
      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('signup-btn');

      // Validation
      if (!firstName) {
        showMessage('Please enter your first name', 'error');
        return;
      }
      if (!lastName) {
        showMessage('Please enter your last name', 'error');
        return;
      }
      if (password.length < 8) {
        showMessage('Password must be at least 8 characters', 'error');
        return;
      }
      if (!/[A-Z]/.test(password) || !/[a-z]/.test(password) || !/[0-9]/.test(password)) {
        showMessage('Password must include uppercase, lowercase, and numbers', 'error');
        return;
      }

      // Show loading state
      document.getElementById('signup-form').style.display = 'none';
      document.getElementById('loading-state').style.display = 'block';

      try {
        // Update user metadata with name
        const { error: updateErr } = await sb.auth.updateUser({
          password: password,
          data: {
            first_name: firstName,
            last_name: lastName
          }
        });

        if (updateErr) throw updateErr;

        // Success!
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('success-state').style.display = 'block';

        // Auto-redirect after 3 seconds
        setTimeout(() => {
          window.location.href = 'https://gg-florida0.vercel.app/';
        }, 3000);

      } catch (err) {
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('signup-form').style.display = 'block';
        showMessage('Error creating account: ' + err.message, 'error');
      }
    }

    function showMessage(text, type) {
      const el = document.getElementById('message');
      el.innerHTML = `<div class="message ${type}">${text}</div>`;
    }
  </script>
</body>
</html>
